name: AI PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Non-blocking AI review
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    continue-on-error: true
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build PR diff
        id: diff
        shell: bash
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff --unified=80 FETCH_HEAD...HEAD > /tmp/pr.diff
          {
            echo "diff<<EOF"
            head -c 60000 /tmp/pr.diff
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: AI review comment
        if: ${{ env.OPENAI_API_KEY != '' && steps.diff.outputs.diff != '' }}
        uses: actions/github-script@v7
        env:
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        with:
          script: |
            const marker = '<!-- two-man-ai-pr-review -->';
            const diff = process.env.PR_DIFF || '';
            const prompt = [
              'You are reviewing a pull request for The Two Man, a private mobile-first golf tournament web app.',
              'Give one concise, useful PR QA summary. Focus on likely bugs, missing tests, risky UX regressions, data/deployment risks, and suggested manual QA.',
              'Do not block the PR. Do not nitpick style. Be specific and practical.',
              '',
              'Return Markdown with these headings:',
              '### AI Review Summary',
              '### Likely Bugs or Risks',
              '### Missing Tests',
              '### UX QA Checks',
              '### Suggested Follow-up',
              '',
              'PR diff:',
              diff
            ].join('\n');

            const response = await fetch('https://api.openai.com/v1/responses', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'gpt-4.1-mini',
                input: prompt,
                max_output_tokens: 1200
              })
            });

            if (!response.ok) {
              core.warning(`AI review request failed: ${response.status} ${await response.text()}`);
              return;
            }

            const data = await response.json();
            const text = data.output_text || data.output?.flatMap((item) => item.content || []).map((content) => content.text || '').join('\n') || '';
            const body = `${marker}\n${text.trim() || 'AI review completed, but no comments were returned.'}\n\n_Non-blocking AI-assisted review. CI remains the source of truth._`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Skip AI review when secret is missing
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY is not configured; skipping non-blocking AI PR review."
